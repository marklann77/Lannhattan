<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lannhattan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="theme-color" content="#0d0d0d">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
    }
  </script>

  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBMpJyjeVafIbPZQC-LeS3AnXrmZ-9abuk",
      authDomain: "lannhattan-5a604.firebaseapp.com",
      projectId: "lannhattan-5a604",
      storageBucket: "lannhattan-5a604.firebasestorage.app",
      messagingSenderId: "309697476545",
      appId: "1:309697476545:web:4960a3de453dc8a722e140"
    };
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.firestore();
    window.auth = firebase.auth();
  </script>

<style>
  :root {
    --bg: #f0f2f5; --surface: #ffffff; --surface2: #f5f6f8; --border: #dde1e7;
    --text: #1a1d23; --text-muted: #7a8394; --accent: #e8c547; --accent2: #3b7fe8;
    --want: #d4a017; --been: #22a55b; --tag-bg: #eef0f3; --radius: 12px;
    --font-body: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
  #map { position: absolute; inset: 0; z-index: 0; }

  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: linear-gradient(to bottom, rgba(240,242,245,0.97) 0%, rgba(240,242,245,0) 100%);
  }

  #wordmark { font-family: var(--font-mono); font-size: 17px; font-weight: 500; letter-spacing: 0.05em; color: #b8960f; flex-shrink: 0; margin-right: 4px; }

  #filter-scroll { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; flex: 1; align-items: center; }
  #filter-scroll::-webkit-scrollbar { display: none; }

  .pill {
    flex-shrink: 0; padding: 5px 11px; border-radius: 20px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.92); color: var(--text-muted); font-size: 12px; font-family: var(--font-mono); cursor: pointer;
    transition: all 0.15s; white-space: nowrap; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .pill.active { background: var(--accent); color: #1a1d23; border-color: #b8960f; font-weight: 500; }
  .pill.status-pill.want.active  { background: var(--want); color: #1a1d23; border-color: var(--want); }
  .pill.status-pill.been.active  { background: var(--been); color: #1a1d23; border-color: var(--been); }

  #add-btn {
    position: absolute; bottom: 28px; right: 18px; z-index: 100;
    width: 52px; height: 52px; border-radius: 50%; background: var(--accent);
    color: #1a1d23; font-size: 26px; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(232,197,71,0.4); transition: transform 0.15s;
  }
  #add-btn:hover { transform: scale(1.08); }

  .sheet {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 18px 32px;
    max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .sheet.open { transform: translateY(0); }

  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .sheet-title { font-family: var(--font-mono); font-size: 14px; font-weight: 500; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 18px; }

  #overlay { position: absolute; inset: 0; z-index: 150; background: rgba(0,0,0,0.35); opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px); }
  #overlay.visible { opacity: 1; pointer-events: all; }

  .form-label { display: block; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; margin-top: 14px; }
  .form-input { width: 100%; padding: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; outline: none; }
  
  .status-select { display: flex; gap: 8px; margin-bottom: 14px; }
  .status-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .status-btn.active-want { background: rgba(212,160,23,0.12); border-color: var(--want); color: var(--want); }
  .status-btn.active-been { background: rgba(34,165,91,0.12); border-color: var(--been); color: var(--been); }

  .tag-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tag-chip { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); font-size: 12px; font-family: var(--font-mono); cursor: pointer; transition: all 0.15s; }
  .tag-chip.selected { background: rgba(59,127,232,0.12); border-color: var(--accent2); color: var(--accent2); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 14px; cursor: pointer; }
  .toggle { width: 40px; height: 22px; background: var(--border); border-radius: 11px; position: relative; transition: background 0.2s; }
  .toggle.on { background: var(--been); }
  .toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
  .toggle.on::after { left: 21px; }

  #detail-img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 14px; display: none; }
  .detail-tag { padding: 4px 10px; border-radius: 20px; background: var(--tag-bg); color: var(--text-muted); font-size: 11px; font-family: var(--font-mono); margin-right: 6px; }

  .marker-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.15s; }
  .marker-dot.want { background: var(--want); }
  .marker-dot.been { background: var(--been); }
  .marker-dot.unset { background: var(--accent2); }

  #auth-bar { position: absolute; bottom: 92px; left: 18px; z-index: 100; }
  #sign-in-btn {
    display: flex; align-items: center; gap: 8px; padding: 9px 14px;
    background: rgba(255,255,255,0.92); border: 1px solid var(--border); border-radius: 20px;
    color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; cursor: pointer; backdrop-filter: blur(6px);
  }
  #sign-in-btn img { width: 18px; height: 18px; border-radius: 50%; }

  #autocomplete-list { position: absolute; width: 100%; background: white; z-index: 300; border: 1px solid var(--border); border-top:none; max-height: 180px; overflow-y: auto; }
  .autocomplete-item { padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); line-height: 1.3; }
  .autocomplete-item strong { display: block; color: var(--text); font-weight: 500; }
  .autocomplete-item span { color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>

  <div id="map"></div>

  <div id="topbar">
    <div id="wordmark">LANNHATTAN</div>
    <div id="filter-scroll">
      <div class="pill status-pill want" data-filter="want" onclick="window.toggleFilter(this)">🔖 Want to go</div>
      <div class="pill status-pill been" data-filter="been" onclick="window.toggleFilter(this)">✅ Been</div>
      <div class="pill" data-filter="free" onclick="window.toggleFilter(this)">Free</div>
      <div class="pill" data-filter="tag:arts" onclick="window.toggleFilter(this)">Arts</div>
      <div class="pill" data-filter="tag:nature" onclick="window.toggleFilter(this)">Nature</div>
      <div class="pill" data-filter="tag:food" onclick="window.toggleFilter(this)">Food</div>
      <div class="pill" data-filter="tag:nightlife" onclick="window.toggleFilter(this)">Nightlife</div>
      <div class="pill" data-filter="tag:coffee" onclick="window.toggleFilter(this)">Coffee</div>
      <div class="pill" data-filter="tag:views" onclick="window.toggleFilter(this)">Views</div>
      <div class="pill" data-filter="tag:shopping" onclick="window.toggleFilter(this)">Shopping</div>
      <div class="pill" data-filter="tag:exercise" onclick="window.toggleFilter(this)">Exercise</div>
    </div>
  </div>

  <div id="auth-bar">
    <div id="sign-in-btn" onclick="window.handleAuthClick()">
      <span id="auth-btn-label">Sign in</span>
    </div>
  </div>

  <button id="add-btn" onclick="window.openAddSheet()">+</button>
  <div id="overlay" onclick="window.closeAllSheets()"></div>

  <div class="sheet" id="add-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add a Place</div>
    <label class="form-label">Search Location</label>
    <div style="position:relative;">
      <input type="text" id="name-input" class="form-input" placeholder="Search..." oninput="onNameInput()" />
      <div id="autocomplete-list"></div>
    </div>
    
    <label class="form-label">Status</label>
    <div class="status-select">
      <div class="status-btn active-want" id="sb-want" onclick="window.setStatus('want')">🔖 Want to go</div>
      <div class="status-btn" id="sb-been" onclick="window.setStatus('been')">✅ Been here</div>
    </div>

    <label class="form-label">Tags</label>
    <div class="tag-chips" id="form-tags">
      <div class="tag-chip" data-tag="arts" onclick="this.classList.toggle('selected')">Arts</div>
      <div class="tag-chip" data-tag="nature" onclick="this.classList.toggle('selected')">Nature</div>
      <div class="tag-chip" data-tag="food" onclick="this.classList.toggle('selected')">Food</div>
      <div class="tag-chip" data-tag="nightlife" onclick="this.classList.toggle('selected')">Nightlife</div>
      <div class="tag-chip" data-tag="coffee" onclick="this.classList.toggle('selected')">Coffee</div>
      <div class="tag-chip" data-tag="views" onclick="this.classList.toggle('selected')">Views</div>
      <div class="tag-chip" data-tag="shopping" onclick="this.classList.toggle('selected')">Shopping</div>
      <div class="tag-chip" data-tag="exercise" onclick="this.classList.toggle('selected')">Exercise</div>
    </div>

    <div class="toggle-row" onclick="window.toggleFree()">
      <span>Free / No cover</span>
      <div class="toggle" id="free-toggle"></div>
    </div>

    <label class="form-label">Notes</label>
    <textarea id="notes-input" class="form-input" style="height:60px; resize:none;"></textarea>
    
    <label class="form-label">Image URL</label>
    <input type="text" id="image-input" class="form-input" placeholder="https://..." />

    <button onclick="window.submitPlace()" style="width:100%; padding:14px; background:var(--accent); border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:20px;">Save Place</button>
    <input type="hidden" id="lat-input" /><input type="hidden" id="lng-input" />
  </div>

  <div class="sheet" id="detail-sheet">
    <div class="sheet-handle"></div>
    <img id="detail-img" src="" />
    <div id="detail-name" style="font-size:20px; font-weight:600; margin-bottom:4px;"></div>
    <div id="detail-tags" style="margin-bottom:12px;"></div>
    <div id="detail-notes" style="font-size:14px; color:var(--text-muted); line-height:1.6; margin-bottom:14px;"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
      <a id="detail-link" target="_blank" style="padding:11px; border:1px solid var(--border); border-radius:8px; text-align:center; text-decoration:none; color:black; font-family:var(--font-mono); font-size:12px;">🔗 Info</a>
      <div onclick="window.detailDirections()" style="padding:11px; border:1px solid var(--border); border-radius:8px; text-align:center; cursor:pointer; font-family:var(--font-mono); font-size:12px;">🗺 Directions</div>
    </div>
  </div>

<script>
// --- AUTH ---
let currentUser = null;
window.handleAuthClick = function() {
  if (currentUser) { if(confirm("Sign out?")) window.auth.signOut(); }
  else { 
    const provider = new firebase.auth.GoogleAuthProvider();
    window.auth.signInWithRedirect(provider);
  }
};
window.auth.getRedirectResult().then(res => { if(res.user) console.log("Login OK"); });
window.auth.onAuthStateChanged(user => {
  currentUser = user;
  const label = document.getElementById('auth-btn-label');
  const btn = document.getElementById('sign-in-btn');
  if (user) {
    label.textContent = user.displayName.split(' ')[0];
    if (user.photoURL) btn.innerHTML = `<img src="${user.photoURL}" /> <span>${label.textContent}</span>`;
  } else {
    btn.innerHTML = `<span id="auth-btn-label">Sign in</span>`;
  }
});

// --- MAP ---
const MAPTILER_KEY = 'qiFcY9lvHhTSrubUMX2y';
const map = new maplibregl.Map({
  container: 'map',
  style: `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAPTILER_KEY}`,
  center: [-73.9857, 40.7484],
  zoom: 11.5
});

// Full original seed data
const seedPlaces = [
  { id: '_s0', name: "GrowNYC Teaching Garden", lat: 40.6872, lng: -74.0167, image: "https://www.grownyc.org/files/imagecache/photo_full/gi_tg_plants.jpg", link: "https://www.grownyc.org/teachinggarden", free: true, tags: ["nature","food"], status: 'been' },
  { id: '_s1', name: "NY Public Library", lat: 40.7532, lng: -73.9819, image: "https://dynamic-media-cdn.tripadvisor.com/media/photo-o/14/21/75/2c/new-york-public-library.jpg?w=900&h=500&s=1", link: "https://www.nypl.org/locations/snfl", free: true, tags: ["arts"], status: 'want' },
  { id: '_s2', name: "St. Patrick's Cathedral", lat: 40.7585, lng: -73.9759, free: true, tags: ["arts"], status: 'want' },
  { id: '_s3', name: "Empire State Building", lat: 40.7484, lng: -73.9857, free: false, tags: ["views","arts"], status: 'want' }
];

let allPlaces = [...seedPlaces];
let markers = [];
let activeFilters = new Set();
let currentStatus = 'want';
let isFree = false;

window.toggleFilter = function(el) {
  const f = el.dataset.filter;
  activeFilters.has(f) ? activeFilters.delete(f) : activeFilters.add(f);
  el.classList.toggle('active');
  renderMarkers();
};

window.setStatus = function(s) {
  currentStatus = s;
  document.getElementById('sb-want').classList.toggle('active-want', s === 'want');
  document.getElementById('sb-been').classList.toggle('active-been', s === 'been');
};

window.toggleFree = function() {
  isFree = !isFree;
  document.getElementById('free-toggle').classList.toggle('on', isFree);
};

function renderMarkers() {
  markers.forEach(m => m.remove());
  markers = [];
  allPlaces.forEach(p => {
    if (!matches(p)) return;
    const el = document.createElement('div');
    el.className = `marker-dot ${p.status || 'unset'}`;
    el.onclick = () => openDetail(p);
    const m = new maplibregl.Marker({ element: el }).setLngLat([p.lng, p.lat]).addTo(map);
    markers.push(m);
  });
}

function matches(p) {
  for (let f of activeFilters) {
    if (f === 'want' && p.status !== 'want') return false;
    if (f === 'been' && p.status !== 'been') return false;
    if (f === 'free' && !p.free) return false;
    if (f.startsWith('tag:') && !(p.tags || []).includes(f.split(':')[1])) return false;
  }
  return true;
}

function openDetail(p) {
  const img = document.getElementById('detail-img');
  if (p.image) { img.src = p.image; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-notes').textContent = p.notes || "";
  document.getElementById('detail-tags').innerHTML = (p.tags || []).map(t => `<span class="detail-tag">${t}</span>`).join('');
  document.getElementById('detail-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
  window.currentDetail = p;
}

window.detailDirections = function() {
  const p = window.currentDetail;
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`, '_blank');
};

window.onNameInput = async function() {
  const q = document.getElementById('name-input').value;
  if (q.length < 3) return;
  const res = await fetch(`https://api.maptiler.com/geocoding/${encodeURIComponent(q)}.json?key=${MAPTILER_KEY}&bbox=-74.3,40.4,-73.6,41.0`);
  const data = await res.json();
  const list = document.getElementById('autocomplete-list');
  list.innerHTML = '';
  data.features.forEach(f => {
    const item = document.createElement('div');
    item.className = 'autocomplete-item';
    item.innerHTML = `<strong>${f.text}</strong><br><small>${f.place_name}</small>`;
    item.onmousedown = () => {
      document.getElementById('name-input').value = f.text;
      document.getElementById('lat-input').value = f.center[1];
      document.getElementById('lng-input').value = f.center[0];
      list.innerHTML = '';
    };
    list.appendChild(item);
  });
};

window.openAddSheet = function() {
  if (!currentUser) return alert("Sign in first!");
  document.getElementById('add-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
};

window.closeAllSheets = function() {
  document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
  document.getElementById('overlay').classList.remove('visible');
};

window.submitPlace = async function() {
  const name = document.getElementById('name-input').value;
  const lat = parseFloat(document.getElementById('lat-input').value);
  const lng = parseFloat(document.getElementById('lng-input').value);
  if (!name || isNaN(lat)) return alert("Search and select a place!");
  const tags = Array.from(document.querySelectorAll('#form-tags .tag-chip.selected')).map(c => c.dataset.tag);
  
  await window.db.collection('places').add({
    name, lat, lng, status: currentStatus, free: isFree,
    tags, notes: document.getElementById('notes-input').value,
    image: document.getElementById('image-input').value,
    uid: currentUser.uid, timestamp: new Date()
  });
  window.closeAllSheets();
};

map.on('load', () => {
  window.db.collection('places').onSnapshot(snap => {
    const fbPlaces = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allPlaces = [...seedPlaces, ...fbPlaces];
    renderMarkers();
  });
});
</script>
</body>
</html>
